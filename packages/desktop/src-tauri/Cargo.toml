# src-tauri/Cargo.toml

[package]
name = "sidecoin"
version = "26.5.28"
description = "Sidecoin — Desktop wallet for the eCash Bitcoin hard fork with BIP-300/301 Drivechain support."
authors = ["0xShomari"]
edition = "2021"
build = "build.rs"
default-run = "sidecoin"

[build-dependencies]
tauri-build = { version = "=2.5.5", features = [] }

[dependencies]
# System
chrono = { version = "=0.4.43", features = ["serde"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.145"
tauri = { version = "=2.10.2", features = ["tray-icon", "image-png", "test"] }
tauri-plugin-dialog = { version = "=2.6.0" }
tauri-plugin-fs = { version = "=2.4.5" }
tauri-plugin-opener = { version = "=2.5.3" }
tauri-plugin-shell = { version = "=2.3.5" }
tauri-plugin-store = { version = "=2.4.2" }
tauri-plugin-updater = { version = "=2.10.0" }

# RPC / Electrum / Node Communication
lazy_static = "=1.4.0"
lru_time_cache = "=0.11.11"
regex = "=1.10.6"
reqwest = { version = "=0.13.1", features = ["blocking", "json"] }
thiserror = "=2.0.18"
tokio = { version = "=1.47.0", features = ["full", "test-util"] }
tower = { version = "=0.5.3", features = ["limit", "load-shed", "util"] }
tracing = "=0.1.41"

# Crypto — Bitcoin / eCash primitives
sha2 = "=0.10.8"
rand = "=0.9.2"
ripemd = "=0.1.3"
bitcoin = "=0.32.8"

# Utilities
base64 = "=0.22.1"
hex = "=0.4.3"

# Debugging / Telemetry
sentry = "=0.46.1"
tauri-plugin-sentry = "=0.5.0"

# Anti-Regression Suite (Specta v2 Unified)
specta = { version = "=2.0.0-rc.22", features = ["derive", "serde", "serde_json", "chrono"] }
specta-typescript = "=0.0.9"
tauri-specta = { version = "=2.0.0-rc.21", features = ["typescript"] }

[dev-dependencies]
mockito = "=1.7.2"

[features]
custom-protocol = ["tauri/custom-protocol"]

[[bin]]
name = "sidecoin"
path = "src/main.rs"

[[bin]]
name = "export_types"
path = "src/export_types.rs"

[package.metadata.cargo-llvm-cov]
# Ignore files that don't contain testable logic
ignore-filename-regex = "(main|export_types|lib)\\.rs$"
