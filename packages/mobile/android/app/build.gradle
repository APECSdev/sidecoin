// packages/mobile/android/app/build.gradle

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native configuration — controls Hermes, autolinking, etc.
 */
react {
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

/**
 * Load the signing config from local keystore.properties if present.
 * For F-Droid builds, signing is handled by the F-Droid build server.
 */
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "app.sidecoin"

    defaultConfig {
        applicationId "app.sidecoin"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 26050011
        versionName "26.5.11"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    /**
     * Distribution flavors:
     *   - fdroid:    Clean FOSS build, no proprietary SDKs (Sentry, etc.)
     *   - playstore: Full build with Sentry crash reporting + analytics
     */
    flavorDimensions "distribution"
    productFlavors {
        fdroid {
            dimension "distribution"
        }
        playstore {
            dimension "distribution"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Sentry — playstore builds only (excluded from F-Droid)
    playstoreImplementation 'io.sentry:sentry-android:7.14.0'
}

/**
 * Once Gradle has evaluated every project, the `installDebug` shorthand
 * would be ambiguous because the `fdroid` and `playstore` product flavors
 * each generate their own install task. Tools like the React Native CLI
 * (`react-native run-android`) still invoke `./gradlew installDebug`,
 * so we register a non-ambiguous alias that forwards to the F-Droid
 * flavor — the default development build. The Play Store flavor can
 * still be installed directly with `./gradlew installPlaystoreDebug`.
 */
gradle.projectsEvaluated {
    def fdroidInstallDebug = tasks.findByName('installFdroidDebug')
    if (fdroidInstallDebug != null && tasks.findByName('installDebug') == null) {
        tasks.register('installDebug') {
            dependsOn fdroidInstallDebug
            description = 'Alias for installFdroidDebug (default development flavor)'
            group = 'install'
        }
    }
}
