# .github/workflows/release.yml
#
# Sidecoin Desktop Release — builds and publishes
# platform binaries when a version tag is pushed.

name: Release Sidecoin Desktop Edition

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            LICENSE.md
            README.md
          body_path: CHANGELOG.md

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      options: --privileged
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends tzdata

      - name: Install Dependencies
        run: |
          apt-get install -y --no-install-recommends \
            curl wget build-essential pkg-config ca-certificates \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libglib2.0-dev libgtk-3-dev libappindicator3-dev \
            librsvg2-dev libssl-dev patchelf libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev \
            libsoup-3.0-dev xdg-utils file desktop-file-utils libfuse2

      - name: Install Node.js 20
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add x86_64-unknown-linux-gnu
          echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Rust Types (The Bridge)
        run: pnpm --filter @sidecoin/desktop type:gen

      - name: Build Tauri Application
        working-directory: packages/desktop
        run: pnpm tauri build --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/rpm/*.rpm

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Rust Types (The Bridge)
        run: pnpm --filter @sidecoin/desktop type:gen

      - name: Prepare Universal Binary for Helper Tools
        working-directory: packages/desktop/src-tauri
        run: |
          cargo build --release --bin export_types --target x86_64-apple-darwin
          cargo build --release --bin export_types --target aarch64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            -output target/universal-apple-darwin/release/export_types \
            target/x86_64-apple-darwin/release/export_types \
            target/aarch64-apple-darwin/release/export_types

      - name: Build Tauri Application
        working-directory: packages/desktop
        run: pnpm tauri build --target universal-apple-darwin --verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS Artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Rust Types (The Bridge)
        run: pnpm --filter @sidecoin/desktop type:gen
        shell: bash

      - name: Build Application
        working-directory: packages/desktop
        run: pnpm tauri build --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    steps:
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
